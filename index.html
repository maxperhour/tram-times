<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Tram">
  <meta name="theme-color" content="#f1e6c8">
  <title>Tram Times</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..800;1,9..144,400..800&family=IBM+Plex+Mono:wght@400&family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper:       #f1e6c8;
      --paper-deep:  #e6d6ad;
      --paper-shade: #dec8a0;
      --ink:         #2e1d12;
      --ink-soft:    #5a3f29;
      --ink-faint:   rgba(46,29,18,0.35);
      --rule:        rgba(46,29,18,0.25);
      --red:         #9c3322;
      --yellow:      #e3a83a;
      --yellow-deep: #b8821f;
      --yellow-soft: #f0c563;
      --led-bg:      #10080a;
      --led-amber:   #f5a623;
      --led-hot:     #ffd86b;
      --led-red:     #ff7a3d;
      --led-dim:     rgba(245,158,11,0.42);
      --led-rule:    rgba(245,158,11,0.18);
      --led-dot:     rgba(245,158,11,0.07);
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body { min-height: 100dvh; background: var(--paper); -webkit-font-smoothing: antialiased; overflow-x: hidden; }

    body {
      background-image:
        radial-gradient(ellipse at 30% 0%, rgba(255,255,255,0.5), transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(46,29,18,0.08), transparent 70%),
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence baseFrequency='1.4' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.18  0 0 0 0 0.12  0 0 0 0 0.07  0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.6'/></svg>");
    }

    #app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      padding: calc(var(--safe-top) + 20px) 18px calc(var(--safe-bottom) + 32px);
      display: flex;
      flex-direction: column;
      font-family: 'Fraunces', Georgia, serif;
      color: var(--ink);
    }

    #content { flex: 1; display: flex; flex-direction: column; }

    /* ── Masthead ── */
    .masthead { display: flex; justify-content: space-between; align-items: baseline; }
    .masthead-brand {
      font-family: 'Fraunces', serif;
      font-variation-settings: 'opsz' 144, 'SOFT' 100, 'wght' 800;
      font-size: 13px; letter-spacing: 0.25em; color: var(--ink);
    }
    .masthead-serial {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; letter-spacing: 0.22em; color: var(--ink-soft);
    }
    .masthead-rule { border-top: 2px solid var(--ink); margin-top: 4px; margin-bottom: 6px; }

    /* ── Stop block ── */
    .stop-block { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .stop-left { flex: 1; min-width: 0; }
    .stop-eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; letter-spacing: 0.3em; color: var(--ink-soft);
    }
    .stop-name-row { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
    .stop-name {
      font-family: 'Fraunces', serif;
      font-variation-settings: 'opsz' 144, 'SOFT' 100, 'wght' 700;
      font-size: 44px; line-height: 0.95; color: var(--ink);
      letter-spacing: -0.01em; cursor: pointer;
    }
    .stop-name em { font-style: italic; color: var(--yellow-deep); }
    .stop-dist {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; color: var(--ink-soft); letter-spacing: 0.18em;
      margin-top: 6px; padding-left: 30px;
    }

    /* ── LIVE stamp ── */
    .live-stamp {
      transform: rotate(8deg); flex-shrink: 0;
      border: 2px solid var(--red); color: var(--red);
      padding: 3px 8px 2px; border-radius: 3px;
      font-family: 'Fraunces', serif;
      font-variation-settings: 'opsz' 144, 'SOFT' 100, 'wght' 800;
      font-size: 13px; letter-spacing: 0.2em;
      opacity: 0.78; transition: opacity 0.3s ease;
    }
    .live-stamp.hidden { opacity: 0; pointer-events: none; }

    /* ── Perforations ── */
    .perf-top, .perf-bottom { height: 8px; background-color: var(--paper-deep); }
    .perf-top {
      -webkit-mask-image: radial-gradient(circle 4px at 4px 8px, transparent 98%, #000 100%);
      mask-image: radial-gradient(circle 4px at 4px 8px, transparent 98%, #000 100%);
      -webkit-mask-size: 8px 8px; mask-size: 8px 8px;
      -webkit-mask-repeat: repeat-x; mask-repeat: repeat-x;
    }
    .perf-bottom {
      -webkit-mask-image: radial-gradient(circle 4px at 4px 0px, transparent 98%, #000 100%);
      mask-image: radial-gradient(circle 4px at 4px 0px, transparent 98%, #000 100%);
      -webkit-mask-size: 8px 8px; mask-size: 8px 8px;
      -webkit-mask-repeat: repeat-x; mask-repeat: repeat-x;
    }

    /* ── Leave-in stub ── */
    .stub-wrap { margin-top: 16px; }
    .stub-body {
      background: var(--paper-deep); padding: 12px 14px;
      border-left: 1px dashed var(--rule); border-right: 1px dashed var(--rule);
      display: flex; align-items: center; gap: 14px;
    }
    .hex-seal {
      flex-shrink: 0; width: 32px; height: 36px;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      background: var(--yellow);
      display: flex; align-items: center; justify-content: center;
      transform: rotate(-6deg);
    }
    .stub-text { flex: 1; min-width: 0; }
    .stub-eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; letter-spacing: 0.3em; color: var(--ink-soft);
    }
    .stub-main { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
    .leave-num {
      font-family: 'Fraunces', serif;
      font-variation-settings: 'opsz' 144, 'SOFT' 100, 'wght' 800;
      font-size: 40px; line-height: 0.9; color: var(--ink);
    }
    .leave-unit {
      font-family: 'Fraunces', serif; font-style: italic;
      font-variation-settings: 'opsz' 144, 'SOFT' 100, 'wght' 500;
      font-size: 20px; color: var(--ink);
    }
    .leave-caption {
      font-family: 'Fraunces', serif; font-style: italic;
      font-variation-settings: 'opsz' 144, 'SOFT' 100, 'wght' 500;
      font-size: 13px; color: var(--ink-soft); margin-left: 4px;
    }
    .leave-caption strong {
      font-style: normal;
      font-variation-settings: 'opsz' 144, 'SOFT' 100, 'wght' 700;
      color: var(--ink);
    }

    /* ── Tram rail ── */
    .tram-track { position: relative; margin-top: 14px; margin-bottom: 8px; height: 36px; }
    .tram-rail { position: absolute; left: 0; right: 0; bottom: 0; height: 3px; background: var(--ink); opacity: 0.85; border-radius: 1px; }
    .tram-sleepers {
      position: absolute; left: 0; right: 0; bottom: -3px; height: 3px;
      background-image: repeating-linear-gradient(90deg, var(--ink) 0, var(--ink) 2px, transparent 2px, transparent 14px);
      opacity: 0.5;
    }
    .tram-clip {
      position: absolute; left: 0; right: 0; top: 0; bottom: 3px; overflow: hidden;
      -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 8%, #000 92%, transparent 100%);
      mask-image: linear-gradient(90deg, transparent 0, #000 8%, #000 92%, transparent 100%);
    }
    #tram-vehicle {
      position: absolute; bottom: 5px;
      display: flex; align-items: flex-end;
      filter: drop-shadow(0 2px 0 rgba(46,29,18,0.18));
    }

    /* ── LED board ── */
    .led-bezel {
      border-radius: 10px; padding: 3px;
      background: linear-gradient(180deg, #3a2a1f 0%, #1f1610 100%);
      box-shadow: 0 1px 0 var(--yellow-soft), inset 0 0 0 1px rgba(0,0,0,0.4);
    }
    .led-screen {
      background: var(--led-bg); border-radius: 8px; padding: 8px 14px;
      position: relative; overflow: hidden;
      background-image: radial-gradient(circle, var(--led-dot) 0.8px, transparent 1.3px);
      background-size: 4px 4px;
    }
    .led-scanlines {
      position: absolute; inset: 0; pointer-events: none;
      background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.18) 0, rgba(0,0,0,0.18) 1px, transparent 1px, transparent 3px);
      mix-blend-mode: multiply;
    }
    .led-vignette {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55));
    }
    .led-header {
      position: relative; z-index: 2;
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 8px; margin-bottom: 4px;
      border-bottom: 1px dashed var(--led-rule);
    }
    .led-title {
      font-family: 'VT323', monospace; font-size: 19px;
      color: var(--led-amber); letter-spacing: 0.18em;
      text-shadow: 0 0 6px rgba(245,166,35,0.53);
    }
    .led-live-group { display: flex; align-items: center; gap: 6px; }
    .led-blink-dot {
      width: 5px; height: 5px; border-radius: 3px;
      background: var(--led-amber); box-shadow: 0 0 6px var(--led-amber);
      animation: led-blink 2s ease-in-out infinite;
    }
    .led-live-text {
      font-family: 'VT323', monospace; font-size: 17px;
      color: var(--led-amber); letter-spacing: 0.25em;
      text-shadow: 0 0 6px rgba(245,166,35,0.53);
    }
    .led-rows { position: relative; z-index: 2; }
    .led-row {
      display: grid; grid-template-columns: 14px 1fr auto 52px;
      align-items: center; gap: 10px; padding: 7px 0;
    }
    .led-row + .led-row { border-top: 1px dotted var(--led-rule); }
    .led-glyph {
      font-family: 'VT323', monospace; font-size: 18px;
      color: var(--led-dim); line-height: 1; text-align: center;
    }
    .led-dest {
      font-family: 'VT323', monospace; font-size: 26px; line-height: 1;
      letter-spacing: 0.05em; white-space: nowrap; overflow: hidden; text-overflow: clip;
    }
    .led-mins {
      font-family: 'VT323', monospace; font-size: 32px; line-height: 1;
      letter-spacing: 0.04em; text-align: right;
    }

    /* ── Direction toggle ── */
    .dir-toggle {
      display: flex; gap: 5px; margin-top: 8px; padding-left: 30px; flex-wrap: wrap;
    }
    .dir-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
      padding: 3px 8px 2px; border-radius: 2px;
      border: 1px solid var(--ink-faint);
      color: var(--ink-soft); background: transparent;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .dir-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

    /* ── Ticket footer ── */
    .ticket-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--ink);
    }
    .issued-time {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px; color: var(--ink-soft); letter-spacing: 0.25em;
    }
    .btn-refresh {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px;
      border: 1.5px solid var(--ink); border-radius: 30px;
      background: var(--paper-deep);
      font-family: 'Fraunces', serif; font-style: italic;
      font-variation-settings: 'opsz' 144, 'SOFT' 100, 'wght' 600;
      font-size: 13px; color: var(--ink);
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: background 0.15s ease;
    }
    .btn-refresh:active, .btn-refresh.spinning { background: var(--paper-shade); }

    /* ── State screens ── */
    .state-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; gap: 12px; padding: 40px 0;
    }
    .state-glyph { font-size: 48px; line-height: 1; margin-bottom: 4px; }
    .state-title {
      font-family: 'Fraunces', serif;
      font-variation-settings: 'opsz' 144, 'SOFT' 100, 'wght' 700;
      font-size: 22px; color: var(--ink);
    }
    .state-body {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px; color: var(--ink-soft); line-height: 1.6; max-width: 260px;
    }
    .btn-action {
      margin-top: 8px; padding: 12px 28px;
      background: var(--yellow); border: 1.5px solid var(--ink); border-radius: 30px;
      font-family: 'Fraunces', serif;
      font-variation-settings: 'opsz' 144, 'SOFT' 100, 'wght' 700;
      font-size: 14px; color: var(--ink); cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Loading skeleton ── */
    .skel {
      background: linear-gradient(90deg,
        rgba(46,29,18,0.06) 25%,
        rgba(46,29,18,0.12) 50%,
        rgba(46,29,18,0.06) 75%
      );
      background-size: 300% 100%;
      border-radius: 4px;
      animation: shimmer 1.6s ease-in-out infinite;
    }

    @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
    @keyframes led-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Stop picker ── */
    .picker-overlay {
      position: fixed; inset: 0; background: rgba(46,29,18,0.4);
      z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
    }
    .picker-overlay.open { opacity: 1; pointer-events: all; }
    .picker-sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      max-width: 430px; margin: 0 auto;
      background: var(--paper);
      border: 1.5px solid var(--ink); border-bottom: none;
      border-radius: 20px 20px 0 0; z-index: 11; max-height: 72vh;
      display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .picker-sheet.open { transform: translateY(0); }
    .picker-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--ink-faint); margin: 12px auto 0; flex-shrink: 0;
    }
    .picker-header {
      padding: 14px 20px 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--ink-soft); flex-shrink: 0; border-bottom: 1px solid var(--rule);
    }
    .picker-list { overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; }
    .picker-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 20px; border-bottom: 1px solid rgba(46,29,18,0.08);
      cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.1s;
    }
    .picker-row:active { background: var(--paper-deep); }
    .picker-row.selected { background: rgba(227,168,58,0.2); }
    .picker-stop-name {
      font-family: 'Fraunces', serif;
      font-variation-settings: 'opsz' 144, 'SOFT' 100, 'wght' 600;
      font-size: 16px; color: var(--ink);
    }
    .picker-row.selected .picker-stop-name { color: var(--yellow-deep); }
    .picker-dist {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; color: var(--ink-soft); flex-shrink: 0; margin-left: 12px;
    }
  </style>
</head>
<body>
<div id="app">
  <div id="content"></div>
  <div class="picker-overlay" id="picker-overlay"></div>
  <div class="picker-sheet" id="picker-sheet">
    <div class="picker-handle"></div>
    <div class="picker-header">Choose a stop</div>
    <div class="picker-list" id="picker-list"></div>
  </div>
</div>

// ── API ───────────────────────────────────────────────────────────────────────
const API_BASE = 'https://europe-west2-tramsfunc.cloudfunctions.net/tramsfunc';

async function fetchTrams() {
  const url   = `${API_BASE}?t=${Date.now()}`;
  const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
  for (const endpoint of [url, proxy]) {
    try {
      const res = await fetch(endpoint, { signal: AbortSignal.timeout(10000), cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return await res.json();
    } catch (e) {
      if (endpoint === proxy) throw e;
    }
  }
}

// ── Geo helpers ───────────────────────────────────────────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return 2*R*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function findNearest(userLat, userLng, apiData) {
  const liveNames = new Set(apiData.map(e => e.StationLocation));
  let best = null, bestDist = Infinity;
  for (const [name, [lat, lng]] of Object.entries(STOPS)) {
    const liveName = [...liveNames].find(n => n.toLowerCase() === name.toLowerCase());
    if (!liveName) continue;
    const d = haversine(userLat, userLng, lat, lng);
    if (d < bestDist) { bestDist = d; best = { name: liveName, dist: d }; }
  }
  return best;
}

function extractDepartures(apiData, stopName) {
  const entries = apiData.filter(e => e.StationLocation === stopName);
  const deps = [];
  for (const entry of entries) {
    for (let i = 0; i <= 3; i++) {
      const dest    = (entry[`Dest${i}`]      || '').trim();
      const waitRaw = (entry[`Wait${i}`]      || '').trim();
      const car     = (entry[`Carriages${i}`] || '').trim();
      if (!dest) continue;
      const waitNum = parseInt(waitRaw);
      const isDue   = waitNum === 0 || waitRaw === '0';
      deps.push({ dest, wait: isNaN(waitNum) ? 0 : waitNum, isDue, carriages: car, direction: entry.Direction });
    }
  }
  const seen = new Set();
  return deps
    .filter(d => { const k = `${d.dest}|${d.wait}`; return seen.has(k) ? false : seen.add(k); })
    .sort((a, b) => a.wait - b.wait);
}

function computeWalkMin(distKm) {
  if (!distKm) return 0;
  return Math.round((distKm * 1.3 / 5) * 60);
}

function fmtTime(d) {
  return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function fmtDistLabel(distKm) {
  return distKm < 1 ? `${Math.round(distKm * 1000)} M` : `${distKm.toFixed(1)} KM`;
}

function formatStopName(name) {
  const words = name.split(' ');
  if (words.length === 1) return name;
  const last = words.pop();
  return `${words.join(' ')} <em>${last}</em>`;
}

function renderTicket(nearest, ledDeps, allDeps, walkMin, catchable, leaveIn, updatedDate, isPinned) {
  const eyebrow = isPinned ? 'PINNED STOP' : 'NEAREST STOP';
  const distLabel = fmtDistLabel(nearest.dist);
  const walkLabel = walkMin <= 1 ? 'AT STOP' : `~${walkMin} MIN WALK`;

  // Direction toggle — only shown when both directions have departures
  const uniqueDirs = [...new Set(allDeps.map(d => d.direction).filter(Boolean))];
  const showDirToggle = uniqueDirs.length >= 2;
  const dirSample = dir => [...new Set(allDeps.filter(d => d.direction === dir).map(d => d.dest))].slice(0, 2).join(', ');
  const dirToggleHTML = showDirToggle ? `
    <div class="dir-toggle">
      <button class="dir-btn ${selectedDirection === 'Incoming' ? 'active' : ''}" onclick="setDirection('Incoming')">${dirSample('Incoming')}</button>
      <button class="dir-btn ${selectedDirection === 'Outgoing' ? 'active' : ''}" onclick="setDirection('Outgoing')">${dirSample('Outgoing')}</button>
    </div>` : '';

  // Classify LED rows
  const firstCatchIdx = ledDeps.findIndex(d => !d.isDue && d.wait >= walkMin);
  const ledRows4 = ledDeps.slice(0, 4);
  const ledRows = ledRows4.map((d, i) => {
    let state;
    if (d.isDue || d.wait < walkMin) state = 'miss';
    else if (i === firstCatchIdx) state = 'catch';
    else state = 'later';
    const colors = { miss: '#ff7a3d', catch: '#ffd86b', later: '#f5a623' };
    const glyphs = { catch: '◆', miss: '✕', later: '·' };
    const c = colors[state];
    const carCount = /double/i.test(d.carriages) ? 2 : 1;
    return `<div class="led-row">
      <span class="led-glyph">${glyphs[state]}</span>
      <span class="led-dest" style="color:${c};text-shadow:0 0 6px ${c}88,0 0 14px ${c}44">${d.dest.toUpperCase()}</span>
      ${carriageMarkHTML(carCount, c)}
      <span class="led-mins" style="color:${c};text-shadow:0 0 8px ${c}aa,0 0 16px ${c}55">${d.isDue ? 'DUE' : d.wait}</span>
    </div>`;
  }).join('');

  // Leave-in stub
  let stubInner;
  if (walkMin <= 1) {
    stubInner = `
      <div class="hex-seal"><div class="walk-icon-container">${walkIconSVG()}</div></div>
      <div class="stub-text">
        <div class="stub-eyebrow">YOU'RE HERE</div>
        <div class="stub-main"><span class="leave-unit" style="font-style:normal;font-size:24px">Board now</span></div>
      </div>`;
  } else if (!catchable) {
    stubInner = `
      <div class="hex-seal"><div class="walk-icon-container">${walkIconSVG()}</div></div>
      <div class="stub-text">
        <div class="stub-eyebrow">NEXT TRAM</div>
        <div class="stub-main"><span class="leave-unit">Check back soon</span></div>
      </div>`;
  } else {
    stubInner = `
      <div class="hex-seal"><div class="walk-icon-container">${walkIconSVG()}</div></div>
      <div class="stub-text">
        <div class="stub-eyebrow">LEAVE IN</div>
        <div class="stub-main">
          <span class="leave-num">${leaveIn}</span>
          <span class="leave-unit">min</span>
          <span class="leave-caption">for the <strong>${catchable.wait}-min</strong> to ${catchable.dest}</span>
        </div>
      </div>`;
  }

  const showTram = !!(catchable && leaveIn !== null && walkMin > 1);

  return `
    <div class="masthead">
      <div class="masthead-brand">⌬ TRAM TIMES</div>
      <div class="masthead-serial">No. 00813 · Ser. M</div>
    </div>
    <div class="masthead-rule"></div>

    <div class="stop-block">
      <div class="stop-left">
        <div class="stop-eyebrow">${eyebrow}</div>
        <div class="stop-name-row">
          ${PIN_SVG}
          <div class="stop-name btn-pin" data-stop="${nearest.name}">${formatStopName(nearest.name)}</div>
        </div>
        <div class="stop-dist">${distLabel} · ${walkLabel}</div>
        ${dirToggleHTML}
      </div>
      <div class="live-stamp" id="live-stamp">LIVE</div>
    </div>

    <div class="stub-wrap">
      <div class="perf-top"></div>
      <div class="stub-body">${stubInner}</div>
      <div class="perf-bottom"></div>
    </div>

    ${showTram ? `<div class="tram-track">
      <div class="tram-clip">
        <div id="tram-vehicle">${tramHTML()}</div>
      </div>
      <div class="tram-rail"></div>
      <div class="tram-sleepers"></div>
    </div>` : ''}

    <div style="flex:1;min-height:0;margin-top:${showTram ? '0' : '14px'}">
      <div class="led-bezel">
        <div class="led-screen">
          <div class="led-scanlines"></div>
          <div class="led-vignette"></div>
          <div class="led-header">
            <span class="led-title">DEPARTURES</span>
            <div class="led-live-group">
              <span class="led-blink-dot"></span>
              <span class="led-live-text">LIVE</span>
            </div>
          </div>
          <div class="led-rows">${ledRows || `<div style="padding:16px 0;font-family:'VT323',monospace;font-size:20px;color:#f5a623;text-align:center;letter-spacing:.1em">NO DEPARTURES</div>`}</div>
        </div>
      </div>
    </div>

    <div class="ticket-footer">
      <span class="issued-time">ISSUED ${fmtTime(updatedDate)}</span>
      <button class="btn-refresh" id="btn-refresh">↻ Refresh</button>
    </div>`;
}

// ── Tram animation ────────────────────────────────────────────────────────────
const TRAM_W = 198;
let tramTarget = 0.5;
let tramTimers = [];

function setTramPhase(phase) {
  const v = document.getElementById('tram-vehicle');
  if (!v) return;
  let left, transition;
  if (phase === 'hidden') {
    left = `-${TRAM_W + 20}px`; transition = 'none';
  } else if (phase === 'enter') {
    const t = Math.max(0.1, tramTarget * 0.5);
    left = `calc(${t * 100}% - ${TRAM_W * 0.4}px)`;
    transition = 'left 1.5s cubic-bezier(0.22,0.61,0.36,1)';
  } else if (phase === 'cruise') {
    left = `calc(${tramTarget * 100}% - ${TRAM_W * tramTarget}px)`;
    transition = 'left 6s cubic-bezier(0.45,0.05,0.55,0.95)';
  } else {
    left = `calc(100% + 20px)`;
    transition = 'left 2.2s cubic-bezier(0.45,0,0.7,0.25)';
  }
  v.style.left = left;
  v.style.transition = transition;
}

function startTramAnimation(target) {
  tramTarget = target;
  tramTimers.forEach(clearTimeout);
  tramTimers = [];
  const cycle = () => {
    setTramPhase('hidden');
    tramTimers.push(setTimeout(() => setTramPhase('enter'),  150));
    tramTimers.push(setTimeout(() => setTramPhase('cruise'), 1800));
    tramTimers.push(setTimeout(() => setTramPhase('depart'), 8500));
    tramTimers.push(setTimeout(cycle, 12000));
  };
  cycle();
}

// ── State ─────────────────────────────────────────────────────────────────────
let userLat = null, userLng = null;
let refreshTimer = null;
let refreshing = false;
let selectedDirection = null;
let lastStop = null;
let lastDeps = [];

const content = document.getElementById('content');

function setLiveStamp(isLive) {
  document.getElementById('live-stamp')?.classList.toggle('hidden', !isLive);
}

function setRefreshing(on) {
  refreshing = on;
  const btn = document.getElementById('btn-refresh');
  if (!btn) return;
  btn.disabled = on;
  btn.classList.toggle('spinning', on);
  btn.innerHTML = on ? '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="animation:spin 0.7s linear infinite"><path d="M10.5 6A4.5 4.5 0 1 1 6 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M6 1.5L8 3.5M6 1.5L8 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Refresh' : '↻ Refresh';
}

function getPinned()   { return localStorage.getItem('pinnedStop'); }
function pinStop(n)    { localStorage.setItem('pinnedStop', n); }
function unpinStop()   { localStorage.removeItem('pinnedStop'); }

function resolveStop(data) {
  const pinned = getPinned();
  if (pinned) {
    const coordKey = Object.keys(STOPS).find(k => k.toLowerCase() === pinned.toLowerCase());
    const dist = coordKey ? haversine(userLat, userLng, STOPS[coordKey][0], STOPS[coordKey][1]) : 0;
    return { name: pinned, dist, isPinned: true };
  }
  const nearest = findNearest(userLat, userLng, data);
  return nearest ? { ...nearest, isPinned: false } : null;
}

function setDirection(dir) {
  selectedDirection = (selectedDirection === dir) ? null : dir;
  if (lastStop?.name) localStorage.setItem('dir_' + lastStop.name, selectedDirection || '');
  if (lastStop && lastDeps.length) applyTicket(lastStop, lastDeps);
}

function applyTicket(stop, deps) {
  if (stop.name !== lastStop?.name) {
    selectedDirection = localStorage.getItem('dir_' + stop.name) || null;
  }
  lastStop = stop;
  lastDeps = deps;
  const filtered = selectedDirection ? deps.filter(d => d.direction === selectedDirection) : deps;
  const walkMin = computeWalkMin(stop.dist);
  const catchable = filtered.find(d => !d.isDue && d.wait >= walkMin);
  const leaveIn = catchable ? Math.max(0, catchable.wait - walkMin) : null;
  content.innerHTML = renderTicket(stop, filtered, deps, walkMin, catchable, leaveIn, new Date(), stop.isPinned);
  if (catchable && leaveIn !== null && walkMin > 1) {
    const target = Math.max(0.05, Math.min(0.85, 1 - leaveIn / walkMin));
    startTramAnimation(target);
  }
}

async function doRefresh() {
  if (!userLat || refreshing) return;
  setRefreshing(true);
  try {
    const data = await fetchTrams();
    const stop = resolveStop(data);
    if (!stop) throw new Error('No stops found nearby.');
    const deps = extractDepartures(data, stop.name);
    applyTicket(stop, deps);
    setLiveStamp(true);
  } catch (e) {
    setLiveStamp(false);
  } finally {
    setRefreshing(false);
  }
}

async function doInit() {
  content.innerHTML = renderLoading();

  let pos;
  try {
    pos = await new Promise((resolve, reject) =>
      navigator.geolocation.getCurrentPosition(resolve, reject, {
        enableHighAccuracy: false, timeout: 15000, maximumAge: 0,
      })
    );
  } catch (e) {
    content.innerHTML = renderNoLocation(e.code);
    document.getElementById('btn-locate')?.addEventListener('click', doInit);
    return;
  }

  userLat = pos.coords.latitude;
  userLng = pos.coords.longitude;

  try {
    const data = await fetchTrams();
    const stop = resolveStop(data);
    if (!stop) {
      content.innerHTML = renderError("Couldn't match your location to a tram stop. Are you near the Metrolink network?");
      return;
    }
    const deps = extractDepartures(data, stop.name);
    applyTicket(stop, deps);
    setLiveStamp(true);
    clearInterval(refreshTimer);
    refreshTimer = setInterval(doRefresh, 30000);
  } catch (e) {
    content.innerHTML = renderError('Could not load tram times. Check your connection and try again.');
  }
}

// ── Event delegation ──────────────────────────────────────────────────────────
content.addEventListener('click', e => {
  if (e.target.closest('#btn-refresh, .btn-refresh')) doRefresh();
  if (e.target.closest('.btn-pin, .stop-name, .stop-name-row')) openPicker();
});

// ── Stop picker ───────────────────────────────────────────────────────────────
const pickerOverlay = document.getElementById('picker-overlay');
const pickerSheet   = document.getElementById('picker-sheet');
const pickerList    = document.getElementById('picker-list');

function openPicker() {
  if (!userLat) return;
  const pinned = getPinned();
  pickerList.innerHTML = Object.entries(STOPS)
    .map(([name, [lat, lng]]) => ({ name, dist: haversine(userLat, userLng, lat, lng) }))
    .sort((a, b) => a.dist - b.dist)
    .map(({ name, dist }) => {
      const distKm = dist;
      const distStr = distKm < 1 ? `${Math.round(distKm*1000)} m` : `${distKm.toFixed(1)} km`;
      return `<div class="picker-row ${pinned === name ? 'selected' : ''}" data-stop="${name}">
        <span class="picker-stop-name">${name}</span>
        <span class="picker-dist">${distStr}</span>
      </div>`;
    }).join('');
  pickerOverlay.classList.add('open');
  pickerSheet.classList.add('open');
  pickerSheet.querySelector('.selected')?.scrollIntoView({ block: 'center' });
}

function closePicker() {
  pickerOverlay.classList.remove('open');
  pickerSheet.classList.remove('open');
}

pickerOverlay.addEventListener('click', closePicker);
pickerList.addEventListener('click', e => {
  const row = e.target.closest('.picker-row');
  if (!row) return;
  const stopName = row.dataset.stop;
  if (getPinned() === stopName) unpinStop(); else pinStop(stopName);
  closePicker();
  doRefresh();
});

doInit();

if ('serviceWorker' in navigator) {
