<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tram">
  <meta name="theme-color" content="#06060F">
  <title>Tram Times</title>
  <link rel="manifest" href="manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #06060F;
      --surface:     rgba(255,255,255,0.038);
      --border:      rgba(255,255,255,0.08);
      --amber:       #F0A020;
      --amber-glow:  rgba(240,160,32,0.12);
      --amber-ring:  rgba(240,160,32,0.28);
      --text:        #EAEAF8;
      --text-mid:    rgba(234,234,248,0.55);
      --text-dim:    rgba(234,234,248,0.30);
      --due:         #3EEEA0;
      --due-glow:    rgba(62,238,160,0.12);
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* Subtle dot-grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(240,160,32,0.09) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow at top */
    body::after {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 360px;
      height: 280px;
      background: radial-gradient(ellipse, rgba(240,160,32,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      padding: calc(var(--safe-top) + 20px) 20px calc(var(--safe-bottom) + 32px);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
      padding-top: 4px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hex-mark {
      width: 30px;
      height: 30px;
      flex-shrink: 0;
    }

    .brand-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--amber);
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: var(--surface);
    }

    .status-pill.live { color: var(--due); border-color: rgba(62,238,160,0.22); }
    .status-pill.live .dot { background: var(--due); animation: pulse 2.4s ease-in-out infinite; }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(62,238,160,0.4); }
      50%       { opacity: 0.6; box-shadow: 0 0 0 4px rgba(62,238,160,0); }
    }

    /* ── Stop hero ── */
    .stop-hero {
      margin-bottom: 24px;
    }

    .stop-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .stop-name-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .stop-name {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.025em;
      line-height: 1.05;
      color: var(--text);
    }

    .btn-pin {
      flex-shrink: 0;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: none;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.18s ease;
      margin-bottom: -2px;
    }

    .btn-pin.pinned {
      background: var(--amber-glow);
      border-color: var(--amber-ring);
      color: var(--amber);
    }

    .stop-meta {
      margin-top: 5px;
      font-size: 13px;
      color: var(--text-dim);
    }

    /* ── Departure list ── */
    .departures {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
    }

    .dep-row {
      position: relative;
      display: flex;
      align-items: center;
      padding: 15px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    /* Left accent bar */
    .dep-row::before {
      content: '';
      position: absolute;
      left: 0; top: 12%; bottom: 12%;
      width: 3px;
      border-radius: 0 2px 2px 0;
      background: var(--amber);
      opacity: 0.55;
      transition: opacity 0.2s ease, background 0.2s ease;
    }

    .dep-row.due-now {
      background: var(--due-glow);
      border-color: rgba(62,238,160,0.18);
    }

    .dep-row.due-now::before {
      background: var(--due);
      opacity: 1;
    }

    .dep-info {
      flex: 1;
      min-width: 0;
    }

    .dep-dest {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .dep-sub {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 3px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .carriage-pip {
      display: inline-flex;
      gap: 2px;
    }

    .carriage-pip i {
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 1.5px;
      background: currentColor;
      opacity: 0.5;
    }

    /* ── Wait time ── */
    .dep-wait {
      flex-shrink: 0;
      margin-left: 16px;
      text-align: right;
      min-width: 52px;
    }

    .wait-num {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      color: var(--text);
    }

    .wait-num.is-due {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--due);
      padding: 4px 8px;
      background: rgba(62,238,160,0.1);
      border-radius: 6px;
    }

    .wait-unit {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 1px;
    }

    /* ── Section divider ── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 12px 4px 6px;
    }

    /* ── Footer ── */
    .footer {
      padding-top: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .updated {
      font-size: 11px;
      color: var(--text-dim);
    }

    .btn-refresh {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text-mid);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .btn-refresh:active {
      background: var(--amber-glow);
      border-color: var(--amber-ring);
      color: var(--amber);
    }

    /* ── State screens ── */
    .state-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 12px;
      padding: 40px 24px;
    }

    .state-glyph {
      font-size: 52px;
      line-height: 1;
      margin-bottom: 4px;
      opacity: 0.7;
    }

    .state-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .state-body {
      font-size: 14px;
      color: var(--text-dim);
      line-height: 1.55;
      max-width: 260px;
    }

    .btn-action {
      margin-top: 8px;
      padding: 13px 30px;
      background: var(--amber-glow);
      border: 1px solid var(--amber-ring);
      border-radius: 100px;
      color: var(--amber);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }

    .btn-action:active { background: rgba(240,160,32,0.22); }

    /* ── Loading skeletons ── */
    .skel-stop-name {
      width: 200px;
      height: 38px;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .skel-stop-meta {
      width: 110px;
      height: 14px;
      border-radius: 4px;
    }

    .skel-row {
      height: 76px;
      border-radius: 14px;
    }

    .skel {
      background: linear-gradient(90deg,
        rgba(255,255,255,0.04) 25%,
        rgba(255,255,255,0.08) 50%,
        rgba(255,255,255,0.04) 75%
      );
      background-size: 300% 100%;
      animation: shimmer 1.6s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Walk card ── */
    .walk-card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 13px 16px;
      background: rgba(240,160,32,0.07);
      border: 1px solid rgba(240,160,32,0.18);
      border-radius: 14px;
      margin-bottom: 10px;
    }

    .walk-card-icon {
      color: var(--amber);
      flex-shrink: 0;
      margin-top: 1px;
    }

    .walk-card-main {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
    }

    .walk-card-main strong { color: var(--amber); font-weight: 700; }

    .walk-card-sub {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 3px;
    }

    .walk-card.at-stop {
      background: var(--due-glow);
      border-color: rgba(62,238,160,0.2);
    }

    .walk-card.at-stop .walk-card-icon { color: var(--due); }

    /* ── Stop picker ── */
    .picker-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .picker-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .picker-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 430px;
      margin: 0 auto;
      background: #0D0D1A;
      border: 1px solid rgba(255,255,255,0.1);
      border-bottom: none;
      border-radius: 20px 20px 0 0;
      z-index: 11;
      max-height: 72vh;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    .picker-sheet.open {
      transform: translateY(0);
    }

    .picker-handle {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.15);
      margin: 12px auto 0;
      flex-shrink: 0;
    }

    .picker-header {
      padding: 16px 20px 12px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .picker-list {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1;
    }

    .picker-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s ease;
    }

    .picker-row:active { background: rgba(255,255,255,0.05); }

    .picker-row.selected { background: var(--amber-glow); }

    .picker-stop-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .picker-row.selected .picker-stop-name { color: var(--amber); }

    .picker-dist {
      font-size: 12px;
      color: var(--text-dim);
      flex-shrink: 0;
      margin-left: 12px;
    }
  </style>
</head>
<body>
<div id="app">
  <header class="header">
    <div class="brand">
      <svg class="hex-mark" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M15 1.5L27 8.25V21.75L15 28.5L3 21.75V8.25L15 1.5Z"
              stroke="#F0A020" stroke-width="1.5" opacity="0.5"/>
        <path d="M15 8L21 11.5V18.5L15 22L9 18.5V11.5L15 8Z"
              fill="#F0A020" opacity="0.9"/>
      </svg>
      <span class="brand-label">Tram</span>
    </div>
    <div class="status-pill" id="status-pill">
      <div class="dot"></div>
      <span id="status-label">Loading</span>
    </div>
  </header>

  <div id="content" style="flex:1;display:flex;flex-direction:column;"></div>

  <!-- Stop picker bottom sheet -->
  <div class="picker-overlay" id="picker-overlay"></div>
  <div class="picker-sheet" id="picker-sheet">
    <div class="picker-handle"></div>
    <div class="picker-header">Choose a stop</div>
    <div class="picker-list" id="picker-list"></div>
  </div>

  <!-- Footer lives outside #content so it never gets wiped on re-render -->
  <div class="footer" id="footer" style="display:none;">
    <span class="updated" id="updated-time"></span>
    <button class="btn-refresh" id="btn-refresh">
      <svg id="refresh-icon" width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M10.5 6A4.5 4.5 0 1 1 6 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M6 1.5L8 3.5M6 1.5L8 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Refresh
    </button>
  </div>
</div>

// ── API ──────────────────────────────────────────────────────────────────────
const API_BASE = 'https://europe-west2-tramsfunc.cloudfunctions.net/tramsfunc';

async function fetchTrams() {
  // Timestamp busts any CDN or proxy cache on every call
  const url   = `${API_BASE}?t=${Date.now()}`;
  const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;

  for (const endpoint of [url, proxy]) {
    try {
      const res = await fetch(endpoint, {
        signal: AbortSignal.timeout(10000),
        cache: 'no-store',
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return await res.json();
    } catch (e) {
      if (endpoint === proxy) throw e;
    }
  }
}

// ── Geolocation helpers ───────────────────────────────────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2
    + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
  return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function findNearest(userLat, userLng, apiData) {
  // Build a set of station names actually present in the live data
  const liveNames = new Set(apiData.map(e => e.StationLocation));

  let best = null, bestDist = Infinity;
  for (const [name, [lat, lng]] of Object.entries(STOPS)) {
    // Case-insensitive match against live data
    const liveName = [...liveNames].find(n => n.toLowerCase() === name.toLowerCase());
    if (!liveName) continue;

    const d = haversine(userLat, userLng, lat, lng);
    if (d < bestDist) { bestDist = d; best = { name: liveName, dist: d }; }
  }
  return best;
}

// ── Departure extraction ──────────────────────────────────────────────────────
function extractDepartures(apiData, stopName) {
  const entries = apiData.filter(e => e.StationLocation === stopName);
  const deps = [];

  for (const entry of entries) {
    for (let i = 0; i <= 3; i++) {
      const dest    = (entry[`Dest${i}`]     || '').trim();
      const waitRaw = (entry[`Wait${i}`]     || '').trim();
      const status  = (entry[`Status${i}`]   || '').trim();
      const car     = (entry[`Carriages${i}`]|| '').trim();

      if (!dest) continue;

      const waitNum = parseInt(waitRaw);
      const isDue   = waitNum === 0 || waitRaw === '0';
      const wait    = isNaN(waitNum) ? 0 : waitNum;

      deps.push({ dest, wait, isDue, carriages: car, direction: entry.Direction });
    }
  }

  // Deduplicate by dest+wait, then sort
  const seen = new Set();
  return deps
    .filter(d => { const k = `${d.dest}|${d.wait}`; return seen.has(k) ? false : seen.add(k); })
    .sort((a, b) => a.wait - b.wait);
}

// ── Formatting ────────────────────────────────────────────────────────────────
function fmtDist(km) {
  return km < 1
    ? `${Math.round(km * 1000)} m away`
    : `${km.toFixed(1)} km away`;
}

function fmtTime(d) {
  return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

// ── Render functions ──────────────────────────────────────────────────────────
function renderLoading() {
  return `
    <div class="stop-hero">
      <div class="stop-eyebrow">Nearest stop</div>
      <div class="skel skel-stop-name"></div>
      <div class="skel skel-stop-meta" style="margin-top:8px;"></div>
    </div>
    <div class="departures">
      ${[...Array(5)].map(() => `<div class="skel skel-row"></div>`).join('')}
    </div>`;
}

function renderDeparture(d) {
  const carCount = /double/i.test(d.carriages) ? 2 : 1;
  const pips = `<div class="carriage-pip">${'<i></i>'.repeat(carCount)}</div>`;
  const carLabel = carCount === 2 ? 'Double' : 'Single';

  const waitEl = d.isDue
    ? `<div class="wait-num is-due">DUE</div>`
    : `<div class="wait-num">${d.wait}</div><div class="wait-unit">min</div>`;

  return `
    <div class="dep-row ${d.isDue ? 'due-now' : ''}">
      <div class="dep-info">
        <div class="dep-dest">${d.dest}</div>
        <div class="dep-sub">${pips}<span>${carLabel}</span></div>
      </div>
      <div class="dep-wait">${waitEl}</div>
    </div>`;
}

const WALK_SVG = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="8" cy="2.5" r="1.5" fill="currentColor"/>
  <path d="M8 4.5L6 9H7.5L7 13H9L8.5 9H10L8 4.5Z" fill="currentColor"/>
  <path d="M6 7L4.5 9M10 7L11.5 9" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
</svg>`;

function renderWalkCard(deps, distKm) {
  if (!distKm) return '';

  const WALK_SPEED_KMH = 5;
  const ROUTE_FACTOR   = 1.3; // straight-line → actual walking distance
  const walkMin = Math.round((distKm * ROUTE_FACTOR / WALK_SPEED_KMH) * 60);

  // At the stop
  if (walkMin <= 1) {
    const next = deps[0];
    if (!next) return '';
    const t = next.isDue ? 'due now' : `in ${next.wait} min`;
    return `<div class="walk-card at-stop">
      <div class="walk-card-icon">${WALK_SVG}</div>
      <div>
        <div class="walk-card-main">You're at the stop</div>
        <div class="walk-card-sub">Next tram <strong style="color:var(--due)">${next.dest}</strong> ${t}</div>
      </div>
    </div>`;
  }

  // Find the first tram you can still catch by leaving now
  const catchable = deps.find(d => d.wait >= walkMin);

  if (catchable) {
    const spare = catchable.wait - walkMin;
    const leaveMsg  = spare >= 2 ? `Leave now or in <strong>${spare} min</strong>` : `Leave now`;
    const catchMsg  = catchable.isDue ? 'due now' : `in ${catchable.wait} min`;
    return `<div class="walk-card">
      <div class="walk-card-icon">${WALK_SVG}</div>
      <div>
        <div class="walk-card-main">${leaveMsg} → catch <strong>${catchable.dest}</strong> ${catchMsg}</div>
        <div class="walk-card-sub">~${walkMin} min walk to stop</div>
      </div>
    </div>`;
  }

  // All current trams leave before you'd arrive — find when to leave for the next one
  const next = deps[deps.length - 1];
  if (next) {
    const leaveIn = walkMin - next.wait;
    return `<div class="walk-card">
      <div class="walk-card-icon">${WALK_SVG}</div>
      <div>
        <div class="walk-card-main">Next trams too soon · leave in <strong>~${leaveIn} min</strong></div>
        <div class="walk-card-sub">~${walkMin} min walk · check back shortly for new times</div>
      </div>
    </div>`;
  }

  return '';
}

const PIN_SVG = `<svg width="13" height="13" viewBox="0 0 13 13" fill="none">
  <path d="M8.5 1L12 4.5L8.5 8H7L5 6V4.5L8.5 1Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" fill="currentColor" fill-opacity="0.15"/>
  <path d="M5 6L2 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
</svg>`;

function getPinned()       { return localStorage.getItem('pinnedStop'); }
function pinStop(name)     { localStorage.setItem('pinnedStop', name); }
function unpinStop()       { localStorage.removeItem('pinnedStop'); }

function renderDepartures(nearest, deps, isPinned) {
  const rows = deps.length
    ? deps.slice(0, 8).map(renderDeparture).join('')
    : `<div class="state-wrap" style="justify-content:flex-start;padding-top:40px;">
         <div class="state-glyph">🚊</div>
         <div class="state-title">No departures</div>
         <div class="state-body">No live departures at ${nearest.name} right now.</div>
       </div>`;

  const meta = isPinned
    ? `${fmtDist(nearest.dist)} &middot; Pinned`
    : fmtDist(nearest.dist);

  return `
    <div class="stop-hero">
      <div class="stop-eyebrow">${isPinned ? 'Pinned stop' : 'Nearest stop'}</div>
      <div class="stop-name-row">
        <div class="stop-name">${nearest.name}</div>
        <button class="btn-pin ${isPinned ? 'pinned' : ''}" data-stop="${nearest.name}">${PIN_SVG}</button>
      </div>
      <div class="stop-meta">${meta}</div>
    </div>
    ${renderWalkCard(deps, nearest.dist)}
    <div class="departures">${rows}</div>`;
}

function renderError(msg) {
  return `
    <div class="state-wrap">
      <div class="state-glyph">⚡</div>
      <div class="state-title">Can't connect</div>
      <div class="state-body">${msg}</div>
      <button class="btn-action" onclick="doInit()">Try again</button>
    </div>`;
}

function renderNoLocation(code) {
  const messages = {
    1: 'Permission denied. On iPhone: Settings → Privacy & Security → Location Services → Safari → set to "While Using". Then reload.',
    2: "Your location couldn’t be determined. Make sure Location Services is on.",
    3: 'Location timed out. Check Location Services is enabled for Safari in iPhone Settings.',
  };
  const body = messages[code] || 'Allow location access to find your nearest tram stop.';
  return `
    <div class="state-wrap">
      <div class="state-glyph">📍</div>
      <div class="state-title">Location needed</div>
      <div class="state-body">${body}</div>
      <button class="btn-action" id="btn-locate">Try again</button>
    </div>`;
}

// ── State ─────────────────────────────────────────────────────────────────────
let userLat = null, userLng = null;
let refreshTimer = null;
let refreshing = false;

const content     = document.getElementById('content');
const statusPill  = document.getElementById('status-pill');
const statusLabel = document.getElementById('status-label');
const footer      = document.getElementById('footer');
const updatedTime = document.getElementById('updated-time');
const btnRefresh  = document.getElementById('btn-refresh');
const refreshIcon = document.getElementById('refresh-icon');

function setStatus(state) {
  statusPill.className = 'status-pill ' + state;
  statusLabel.textContent = { live: 'Live', loading: 'Loading', error: 'Error' }[state] || state;
}

function setUpdated(date) {
  updatedTime.textContent = 'Updated ' + fmtTime(date);
  footer.style.display = 'flex';
}

function setRefreshing(on) {
  refreshing = on;
  refreshIcon.style.animation = on ? 'spin 0.7s linear infinite' : '';
  btnRefresh.disabled = on;
}

function resolveStop(data) {
  const pinned = getPinned();
  if (pinned) {
    const coordKey = Object.keys(STOPS).find(k => k.toLowerCase() === pinned.toLowerCase());
    const dist = coordKey ? haversine(userLat, userLng, STOPS[coordKey][0], STOPS[coordKey][1]) : 0;
    return { name: pinned, dist, isPinned: true };
  }
  const nearest = findNearest(userLat, userLng, data);
  return nearest ? { ...nearest, isPinned: false } : null;
}

async function doRefresh() {
  if (!userLat || refreshing) return;
  setRefreshing(true);
  try {
    const data = await fetchTrams();
    const stop = resolveStop(data);
    if (!stop) throw new Error('No stops found nearby.');
    const deps = extractDepartures(data, stop.name);
    content.innerHTML = renderDepartures(stop, deps, stop.isPinned);
    setUpdated(new Date());
    setStatus('live');
  } catch (e) {
    setStatus('error');
  } finally {
    setRefreshing(false);
  }
}

async function doInit() {
  content.innerHTML = renderLoading();
  footer.style.display = 'none';
  setStatus('loading');

  let pos;
  try {
    pos = await new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(resolve, reject, {
        enableHighAccuracy: false,
        timeout: 15000,
        maximumAge: 0,
      });
    });
  } catch (e) {
    content.innerHTML = renderNoLocation(e.code);
    setStatus('error');
    // Wire up Try Again button via delegation since it's inside content
    document.getElementById('btn-locate')?.addEventListener('click', doInit);
    return;
  }

  userLat = pos.coords.latitude;
  userLng = pos.coords.longitude;

  try {
    const data = await fetchTrams();
    const stop = resolveStop(data);
    if (!stop) {
      content.innerHTML = renderError("Couldn't match your location to a tram stop. Are you near the Metrolink network?");
      setStatus('error');
      return;
    }
    const deps = extractDepartures(data, stop.name);
    content.innerHTML = renderDepartures(stop, deps, stop.isPinned);
    setUpdated(new Date());
    setStatus('live');

    clearInterval(refreshTimer);
    refreshTimer = setInterval(doRefresh, 30000);
  } catch (e) {
    content.innerHTML = renderError('Could not load tram times. Check your connection and try again.');
    setStatus('error');
  }
}

// Persistent refresh button
btnRefresh.addEventListener('click', doRefresh);

// ── Stop picker ──────────────────────────────────────────────────────────────
const pickerOverlay = document.getElementById('picker-overlay');
const pickerSheet   = document.getElementById('picker-sheet');
const pickerList    = document.getElementById('picker-list');

function openPicker() {
  if (!userLat) return;

  // Build list of all known stops sorted by distance from user
  const pinned = getPinned();
  const rows = Object.entries(STOPS)
    .map(([name, [lat, lng]]) => ({ name, dist: haversine(userLat, userLng, lat, lng) }))
    .sort((a, b) => a.dist - b.dist)
    .map(({ name, dist }) => {
      const sel = pinned === name ? 'selected' : '';
      return `<div class="picker-row ${sel}" data-stop="${name}">
        <span class="picker-stop-name">${name}</span>
        <span class="picker-dist">${fmtDist(dist)}</span>
      </div>`;
    }).join('');

  pickerList.innerHTML = rows;
  pickerOverlay.classList.add('open');
  pickerSheet.classList.add('open');

  // Scroll selected stop into view
  pickerSheet.querySelector('.selected')?.scrollIntoView({ block: 'center' });
}

function closePicker() {
  pickerOverlay.classList.remove('open');
  pickerSheet.classList.remove('open');
}

pickerOverlay.addEventListener('click', closePicker);

pickerList.addEventListener('click', e => {
  const row = e.target.closest('.picker-row');
  if (!row) return;
  const stopName = row.dataset.stop;
  if (getPinned() === stopName) unpinStop(); else pinStop(stopName);
  closePicker();
  doRefresh();
});

// Pin button opens picker instead of toggling directly
content.addEventListener('click', e => {
  const btn = e.target.closest('.btn-pin');
  if (!btn) return;
  openPicker();
});

doInit();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}
</script>
</body>
</html>
